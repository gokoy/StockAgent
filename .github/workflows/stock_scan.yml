name: stock-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

jobs:
  run-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare KR flow snapshot
        continue-on-error: true
        env:
          KR_FLOW_PATH: ${{ vars.KR_FLOW_PATH }}
          KR_FLOW_KOSPI_FOREIGN: ${{ vars.KR_FLOW_KOSPI_FOREIGN }}
          KR_FLOW_KOSPI_INSTITUTION: ${{ vars.KR_FLOW_KOSPI_INSTITUTION }}
          KR_FLOW_KOSPI_INDIVIDUAL: ${{ vars.KR_FLOW_KOSPI_INDIVIDUAL }}
          KR_FLOW_KOSDAQ_FOREIGN: ${{ vars.KR_FLOW_KOSDAQ_FOREIGN }}
          KR_FLOW_KOSDAQ_INSTITUTION: ${{ vars.KR_FLOW_KOSDAQ_INSTITUTION }}
          KR_FLOW_KOSDAQ_INDIVIDUAL: ${{ vars.KR_FLOW_KOSDAQ_INDIVIDUAL }}
        run: |
          python scripts/update_kr_flow_snapshot.py --source auto --output "${KR_FLOW_PATH:-data/inputs/kr_flow_snapshot.json}" || true

      - name: Prepare event calendar snapshot
        continue-on-error: true
        env:
          HOLDINGS_PATH: ${{ vars.HOLDINGS_PATH }}
          EVENT_CALENDAR_PATH: ${{ vars.EVENT_CALENDAR_PATH }}
          US_STOCK_UNIVERSE: ${{ vars.US_STOCK_UNIVERSE }}
          KR_STOCK_UNIVERSE: ${{ vars.KR_STOCK_UNIVERSE }}
          US_UNIVERSE_SOURCE: ${{ vars.US_UNIVERSE_SOURCE }}
        run: |
          python scripts/update_event_calendar.py --output "${EVENT_CALENDAR_PATH:-data/inputs/event_calendar.json}" || true

      - name: Run swing scan
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          LLM_MODEL_DEFAULT: ${{ vars.LLM_MODEL_DEFAULT || vars.LLM_MODEL || 'gpt-4.1-mini' }}
          LLM_MODEL_CHART: ${{ vars.LLM_MODEL_CHART }}
          LLM_MODEL_NEWS: ${{ vars.LLM_MODEL_NEWS }}
          LLM_MODEL_FINAL: ${{ vars.LLM_MODEL_FINAL }}
          LLM_MODEL_MACRO: ${{ vars.LLM_MODEL_MACRO }}
          UNIVERSE_MODE: ${{ vars.UNIVERSE_MODE || 'discovery_plus_watchlist' }}
          US_UNIVERSE_SOURCE: ${{ vars.US_UNIVERSE_SOURCE || 'curated' }}
          HOLDINGS_PATH: ${{ vars.HOLDINGS_PATH }}
          KR_FLOW_PATH: ${{ vars.KR_FLOW_PATH }}
          EVENT_CALENDAR_PATH: ${{ vars.EVENT_CALENDAR_PATH }}
          KR_FLOW_KOSPI_FOREIGN: ${{ vars.KR_FLOW_KOSPI_FOREIGN }}
          KR_FLOW_KOSPI_INSTITUTION: ${{ vars.KR_FLOW_KOSPI_INSTITUTION }}
          KR_FLOW_KOSPI_INDIVIDUAL: ${{ vars.KR_FLOW_KOSPI_INDIVIDUAL }}
          KR_FLOW_KOSDAQ_FOREIGN: ${{ vars.KR_FLOW_KOSDAQ_FOREIGN }}
          KR_FLOW_KOSDAQ_INSTITUTION: ${{ vars.KR_FLOW_KOSDAQ_INSTITUTION }}
          KR_FLOW_KOSDAQ_INDIVIDUAL: ${{ vars.KR_FLOW_KOSDAQ_INDIVIDUAL }}
          US_STOCK_UNIVERSE: ${{ vars.US_STOCK_UNIVERSE }}
          KR_STOCK_UNIVERSE: ${{ vars.KR_STOCK_UNIVERSE }}
          INCLUDE_WATCHLIST: ${{ vars.INCLUDE_WATCHLIST || 'true' }}
          WATCHLIST_MAX_WEAK_RUNS: ${{ vars.WATCHLIST_MAX_WEAK_RUNS || '3' }}
          MIN_PRICE_US: ${{ vars.MIN_PRICE_US || '10' }}
          MIN_PRICE_KR: ${{ vars.MIN_PRICE_KR || '5000' }}
          MIN_AVG_VOLUME: ${{ vars.MIN_AVG_VOLUME || '1000000' }}
          MAX_NEWS_AGE_HOURS: ${{ vars.MAX_NEWS_AGE_HOURS || '72' }}
          TOP_N_CANDIDATES: ${{ vars.TOP_N_CANDIDATES || '5' }}
          CANDIDATE_MIN_FINAL_SCORE: ${{ vars.CANDIDATE_MIN_FINAL_SCORE || '70' }}
          OBSERVE_MIN_FINAL_SCORE: ${{ vars.OBSERVE_MIN_FINAL_SCORE || '55' }}
          CANDIDATE_MIN_CHART_SCORE: ${{ vars.CANDIDATE_MIN_CHART_SCORE || '68' }}
          CANDIDATE_MIN_NEWS_SCORE: ${{ vars.CANDIDATE_MIN_NEWS_SCORE || '45' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.main

      - name: Upload JSON outputs
        uses: actions/upload-artifact@v4
        with:
          name: stockagent-outputs
          path: data/outputs/*.json
          if-no-files-found: warn

      - name: Upload performance outputs
        uses: actions/upload-artifact@v4
        with:
          name: stockagent-performance
          path: data/performance/*.json
          if-no-files-found: warn
